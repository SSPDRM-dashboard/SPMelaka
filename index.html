<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSPDRM - Dashboard Penugasan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#003087;--navy-dark:#001f5c;--navy-mid:#0a3fa8;--gold:#FFD700;--gold-dark:#c9a800;--dark:#0f172a;--muted:#64748b;--card:#fff;--bg:#f1f5f9;--border:#e2e8f0;--red:#dc2626;--green:#16a34a;--amber:#d97706;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
  #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-mid) 60%,#1d4ed8 100%);position:fixed;inset:0;z-index:999;}
  .login-box{background:white;border-radius:20px;padding:40px 44px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.35);text-align:center;}
  .login-logo{width:80px;height:80px;object-fit:contain;margin-bottom:16px;}
  .login-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:var(--navy);letter-spacing:.04em;margin-bottom:4px;}
  .login-sub{font-size:12px;color:var(--muted);margin-bottom:28px;letter-spacing:.06em;text-transform:uppercase;}
  .login-field{margin-bottom:16px;text-align:left;}
  .login-field label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
  .login-field input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;color:var(--dark);transition:border-color .2s;}
  .login-field input:focus{border-color:var(--navy);}
  .btn-login{width:100%;background:linear-gradient(135deg,var(--navy-dark),var(--navy-mid));color:white;border:none;border-radius:10px;padding:13px;font-size:14px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.04em;transition:opacity .2s;}
  .btn-login:hover{opacity:.9;}
  .login-error{background:#FFF0F0;border:1px solid #FFCDD2;color:#C0392B;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:14px;display:none;}
  .login-footer{font-size:11px;color:var(--muted);margin-top:20px;}
  .login-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
  #dashboardPage{display:none;}
  header{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy-mid) 100%);padding:0 32px;height:72px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,48,135,0.4);border-bottom:3px solid var(--gold);}
  .header-left{display:flex;align-items:center;gap:16px;}
  .pdrm-logo{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));}
  .header-titles{display:flex;flex-direction:column;}
  .header-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:white;letter-spacing:.05em;line-height:1.1;}
  .header-sub{font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:.08em;text-transform:uppercase;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .live-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 12px;}
  .live-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
  .live-text{font-size:12px;color:white;font-weight:500;}
  .date-day{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:var(--gold);}
  .user-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:5px 12px;}
  .user-pill span{font-size:12px;color:white;font-weight:600;}
  .btn-logout{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;border-radius:8px;padding:5px 12px;font-size:12px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;}
  .btn-logout:hover{background:rgba(255,255,255,0.25);}
  /* --- truncated: same CSS for dashboard --- */
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-box">
    <div class="logo-container">
      <img 
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Seal_of_the_Royal_Malaysia_Police.svg/240px-Seal_of_the_Royal_Malaysia_Police.svg.png"
      class="login-logo"
      alt="PDRM Logo">
    </div>
    <div class="login-sub">Sistem Penugasan Anggota SSPDRM</div>
    <div class="login-field"><label>Nama Pengguna</label><input type="text" id="loginUser" placeholder="Masukkan nama pengguna..." autocomplete="username"/></div>
    <div class="login-field"><label>Kata Laluan</label><input type="password" id="loginPass" placeholder="Masukkan kata laluan..." autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn-login" onclick="doLogin()">LOG MASUK</button>
    <div class="login-error" id="loginError">❌ Nama pengguna atau kata laluan tidak sah.</div>
    <hr class="login-divider">
    <div class="login-footer">SSPDRM Melaka<br>Sistem ini adalah untuk kegunaan sspdrm melaka sahaja.</div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="dashboardPage">
  <header>
    <div class="header-left">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Seal_of_the_Royal_Malaysia_Police.svg/240px-Seal_of_the_Royal_Malaysia_Police.svg.png" class="pdrm-logo" alt="PDRM">
      <div class="header-titles"><div class="header-title">SSPDRM MELAKA</div><div class="header-sub">Sistem Penugasan Anggota SSPDRM · Dashboard</div></div>
    </div>
    <div class="header-right">
      <div style="text-align:right;"><div class="date-day" id="headerDate">—</div><div style="font-size:11px;color:rgba(255,255,255,0.6);" id="headerTime">—</div></div>
      <div class="live-badge"><div class="live-dot"></div><div class="live-text" id="liveText">Live</div></div>
      <div class="user-pill"><span>👤</span><span id="userPillName">—</span></div>
      <button class="btn-logout" onclick="doLogout()">Log Keluar</button>
    </div>
  </header>
  <main>
    <h2>Dashboard content here...</h2>
    <!-- Replace with your existing dashboard content -->
  </main>
</div>

<script>
// Users
const USERS = {
  'admin':        { password: 'admin123',  role: 'admin',  tab: null },
  'rosziah':      { password: 'asp1528',   role: 'admin',  tab: null },
  'melakatengah': { password: 'mt1234',    role: 'daerah', tab: 'd1' }
  // add remaining users...
};

// LOGIN FUNCTION
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginError');
  if(USERS[u] && USERS[u].password === p){
    err.style.display='none';
    document.getElementById('loginPage').style.display='none';
    document.getElementById('dashboardPage').style.display='block';
    document.getElementById('userPillName').textContent = u;
    updateDateTime();
  } else {
    err.style.display='block';
  }
}

// LOGOUT FUNCTION
function doLogout() {
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('dashboardPage').style.display='none';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// UPDATE DATE/TIME
function updateDateTime(){
  const now = new Date();
  document.getElementById('headerDate').textContent = now.toLocaleDateString('ms-MY', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('headerTime').textContent = now.toLocaleTimeString('ms-MY');
}
setInterval(updateDateTime, 1000);
</script>

</body>
</html>
